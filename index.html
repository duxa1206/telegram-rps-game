<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камень, Ножницы, Бумага</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-controls">
            <button class="fullscreen-btn" id="fullscreen-btn">
                ⛶ Full
            </button>
            <div class="mini-score" id="mini-score" style="display: none;">
                <span id="mini-player">0</span> : <span id="mini-bot">0</span>
            </div>
        </div>
        
        <div class="theme-switcher" id="theme-switcher">
            <button class="theme-btn" data-theme="classic">🎨 Классика</button>
            <button class="theme-btn" data-theme="neon">💜 Неон</button>
            <button class="theme-btn" data-theme="space">🌌 Космос</button>
        </div>
        
        <h1>🎮 Камень, Ножницы, Бумага</h1>
        
        <div class="score-board">
            <div class="score">
                <span>Ты:</span>
                <span id="player-score">0</span>
                <span class="score-icon">🔥</span>
            </div>
            <div class="score">
                <span>Бот:</span>
                <span id="bot-score">0</span>
                <span class="score-icon">💀</span>
            </div>
        </div>
        
        <div class="game-controls">
            <button class="control-btn" id="sound-toggle">
                🔊 Звук: ВКЛ
            </button>
            <button class="control-btn" id="create-game-btn">
                🎮 Создать игру
            </button>
        </div>
        
        <div class="game-mode-select" id="game-mode-select" style="display: none;">
            <p>Сколько игр в серии?</p>
            <div class="mode-buttons">
                <button class="mode-btn" data-games="1">1 игра</button>
                <button class="mode-btn" data-games="3">3 игры</button>
                <button class="mode-btn" data-games="5">5 игр</button>
            </div>
        </div>
        
        <div class="create-game-area" id="create-game-area" style="display: none;">
            <p>Твой ход <span id="current-game-num">1</span> из <span id="total-games-num">1</span>:</p>
            <div class="buttons">
                <button class="choice-btn" data-choice="камень">
                    ⚪ Камень
                </button>
                <button class="choice-btn" data-choice="ножницы">
                    ✂ Ножницы
                </button>
                <button class="choice-btn" data-choice="бумага">
                    📄 Бумага
                </button>
            </div>
        </div>
        
        <div class="waiting-area" id="waiting-area" style="display: none;">
            <div class="waiting-icon">⏳</div>
            <p>Ждём ответа соперника...</p>
            <p class="waiting-hint">Покажи экран другу или сделай скриншот</p>
        </div>
        
        <div class="game-area">
            <div class="choice-area">
                <p>Выберите:</p>
                <div class="buttons buttons-normal">
                    <button class="choice-btn" data-choice="камень">
                        ⚪ Камень
                    </button>
                    <button class="choice-btn" data-choice="ножницы">
                        ✂ Ножницы
                    </button>
                    <button class="choice-btn" data-choice="бумага">
                        📄 Бумага
                    </button>
                </div>
                <div class="buttons buttons-fullscreen" id="fullscreen-buttons" style="display: none;">
                    <button class="choice-btn-fs" data-choice="камень">
                        <span class="fs-emoji">⚪</span>
                        <span class="fs-label">Камень</span>
                        <div class="ripple"></div>
                    </button>
                    <button class="choice-btn-fs" data-choice="ножницы">
                        <span class="fs-emoji">✂</span>
                        <span class="fs-label">Ножницы</span>
                        <div class="ripple"></div>
                    </button>
                    <button class="choice-btn-fs" data-choice="бумага">
                        <span class="fs-emoji">📄</span>
                        <span class="fs-label">Бумага</span>
                        <div class="ripple"></div>
                    </button>
                </div>
            </div>
            
            <button class="exit-fullscreen-btn" id="exit-fullscreen-btn" style="display: none;">
                ⬇ Свернуть
            </button>

            <div class="thinking-area" id="thinking-area" style="display: none;">
                <p>Бот выбирает...</p>
                <div class="thinking-emoji" id="thinking-emoji">⚪</div>
            </div>
            
            <div class="battle-area" id="battle-area" style="display: none;">
                <div class="fighter player-fighter">
                    <div class="fighter-emoji" id="player-fighter-emoji">⚪</div>
                    <div class="fighter-name">Вы</div>
                </div>
                <div class="vs-badge">VS</div>
                <div class="fighter bot-fighter">
                    <div class="fighter-emoji" id="bot-fighter-emoji">⚪</div>
                    <div class="fighter-name">Бот</div>
                </div>
                <div class="battle-effect" id="battle-effect"></div>
            </div>
            
            <div class="result-area" id="result-area" style="display: none;">
                <div class="choices">
                    <div class="player-choice">
                        <p>Вы:</p>
                        <span id="player-choice-display">-</span>
                    </div>
                    <div class="vs">VS</div>
                    <div class="bot-choice">
                        <p>Бот:</p>
                        <span id="bot-choice-display">-</span>
                    </div>
                </div>
                <div class="result-message" id="result-message"></div>
                <button class="play-again-btn" id="play-again-btn">Играть снова</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
