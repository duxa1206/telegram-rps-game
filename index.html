<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камень, Ножницы, Бумага</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-switcher" id="theme-switcher">
            <button class="theme-btn" data-theme="classic">🎨 Классика</button>
            <button class="theme-btn" data-theme="neon">💜 Неон</button>
            <button class="theme-btn" data-theme="space">🌌 Космос</button>
        </div>
        
        <h1>🎮 Камень, Ножницы, Бумага</h1>
        
        <div class="score-board">
            <div class="score">
                <span>Ты:</span>
                <span id="player-score">0</span>
                <span class="score-icon">🔥</span>
            </div>
            <div class="streak-display" id="streak-display">
                <span class="streak-icon">⚡</span>
                <span id="streak-count">x0</span>
            </div>
            <div class="score">
                <span>Бот:</span>
                <span id="bot-score">0</span>
                <span class="score-icon">💀</span>
            </div>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill player-fill" id="player-fill"></div>
                <div class="progress-fill bot-fill" id="bot-fill"></div>
            </div>
            <div class="progress-labels">
                <span>Серия до 5 побед</span>
                <span id="progress-text">0 : 0</span>
            </div>
        </div>
        
        <button class="new-series-btn" id="new-series-btn" style="display: none;">
            🔄 Новая серия
        </button>
        
        <div class="game-area">
            <div class="choice-area">
                <p>Выберите:</p>
                <div class="buttons">
                    <button class="choice-btn" data-choice="камень">
                        ⚪ Камень
                    </button>
                    <button class="choice-btn" data-choice="ножницы">
                        ✂ Ножницы
                    </button>
                    <button class="choice-btn" data-choice="бумага">
                        📄 Бумага
                    </button>
                </div>
            </div>

            <div class="thinking-area" id="thinking-area" style="display: none;">
                <p>Бот выбирает...</p>
                <div class="thinking-emoji" id="thinking-emoji">⚪</div>
            </div>
            
            <div class="battle-area" id="battle-area" style="display: none;">
                <div class="fighter player-fighter">
                    <div class="fighter-emoji" id="player-fighter-emoji">⚪</div>
                    <div class="fighter-name">Вы</div>
                </div>
                <div class="vs-badge">VS</div>
                <div class="fighter bot-fighter">
                    <div class="fighter-emoji" id="bot-fighter-emoji">⚪</div>
                    <div class="fighter-name">Бот</div>
                </div>
                <div class="battle-effect" id="battle-effect"></div>
            </div>
            
            <div class="result-area" id="result-area" style="display: none;">
                <div class="choices">
                    <div class="player-choice">
                        <p>Вы:</p>
                        <span id="player-choice-display">-</span>
                    </div>
                    <div class="vs">VS</div>
                    <div class="bot-choice">
                        <p>Бот:</p>
                        <span id="bot-choice-display">-</span>
                    </div>
                </div>
                <div class="result-message" id="result-message"></div>
                <button class="play-again-btn" id="play-again-btn">Играть снова</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
